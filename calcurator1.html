<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcurator</title>
    <link rel="stylesheet" href="calcuratorcss.css">  <!--add CSS file--> 
</head>
<body> 
  <h1 style="align-items: center;"> Calcurator</h1>

    <div class="calculator">  <!-- Maked by basic calculator-->
        <input type="text" placeholder="0" id="inputbox"> 
        <div>
            <button>AC</button>
            <button>DEL</button>
            <button>%</button>
            <button>/</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
        </div>

        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
        </div>

        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
        </div>

        <div>
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="equalbtn">=</button>
        </div>

    </div>
    <p>this calcurators perform the basic task</p>
    
    <script src="calcuratorjs.js"></script>  <!--add javascript files -->
    
</body>
</html>
